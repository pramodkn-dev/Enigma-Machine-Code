syntax = "proto3";
import "google/api/annotations.proto";
option csharp_namespace = "PriceHub.Service.Protos";
package pricehub.v1;
message PriceQuery { string sku = 1; string market = 2; string effective_from = 3; }
message PriceRow   { string sku = 1; string currency = 2; string price = 3; string effective_date = 4; }
message PriceJobIn { string market = 1; repeated string skus = 2; }
message PriceJobOut { string job_id = 1; string status = 2; }
service PriceService {
  rpc StreamPrices(PriceQuery) returns (stream PriceRow) { option (google.api.http) = { get: "/v1/prices" }; }
  rpc TriggerPriceJob(PriceJobIn) returns (PriceJobOut) { option (google.api.http) = { post: "/v1/priceJobs", body: "*" }; }
}
